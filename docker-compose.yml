version: '3.8'

# ─────────────────────────────────────────────────────────────
# Calango Investimentos — Airflow Distribuído com Celery
# ─────────────────────────────────────────────────────────────
# Comandos úteis:
#
#  Subir com N workers:
#    docker compose up -d --scale airflow-worker=N
#
#  Escalar sem derrubar:
#    docker compose up -d --scale airflow-worker=2 --no-recreate
#
#  Derrubar tudo:
#    docker compose down
# ─────────────────────────────────────────────────────────────

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.2
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW__CORE__DEFAULT_TIMEZONE: America/Sao_Paulo
    AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: America/Sao_Paulo
    _PIP_ADDITIONAL_REQUIREMENTS: ''
    AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: '300'
    AIRFLOW__WEBSERVER__WORKERS: '2'
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./config:/opt/airflow/config
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:

  # ── Banco de dados ──────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: calango_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 10s

  # ── Redis (broker Celery) ───────────────────────────────────
  redis:
    image: redis:7.2
    container_name: calango_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
      start_period: 10s

  # ── Webserver ───────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: calango_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

  # ── Scheduler ──────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: calango_scheduler
    command: scheduler
    restart: always

  # ── Worker Celery (escalável dinamicamente) ─────────────────
  # Fixar em 3:   docker compose up -d --scale airflow-worker=3
  # Escalar p/ 5: docker compose up -d --scale airflow-worker=5
  # Reduzir p/ 2: docker compose up -d --scale airflow-worker=2 --no-recreate
  airflow-worker:
    <<: *airflow-common
    command: celery worker
    restart: always
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"

  # ── Flower (UI de monitoramento dos workers) ────────────────
  airflow-flower:
    <<: *airflow-common
    container_name: calango_flower
    command: celery flower
    ports:
      - "5555:5555"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5555/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

  # ── Init (roda uma vez e encerra) ──────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: calango_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname Calango \
          --role Admin \
          --email admin@calango.com \
          --password admin
        airflow connections add 'postgres_calango' \
          --conn-type postgres \
          --conn-host postgres \
          --conn-login airflow \
          --conn-password airflow \
          --conn-schema airflow \
          --conn-port 5432
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
    restart: on-failure

volumes:
  postgres_data:
